# -----------------------------------------------------
# Martin's Kitty overrides
# This gets copied to ~/.config/kitty/custom.conf
# Loaded last by kitty.conf — later settings win.
# -----------------------------------------------------

# ----- Font -----
font_size               13

# ----- Appearance -----
# background_opacity  0.8
# window_padding_width 12

# ----- Tab bar -----
tab_bar_edge            top
tab_bar_style           fade
tab_fade                0.25 0.5 0.75 1
tab_bar_min_tabs        1
tab_title_template      " {index} "
active_tab_font_style   bold
tab_bar_background      none
active_tab_foreground   #1e1e2e
active_tab_background   #cdd6f4
inactive_tab_foreground #6c7086
inactive_tab_background #313244

# ----- Behavior -----
# Copy/paste on ctrl+c/v, SIGINT on ctrl+shift+c
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+shift+c send_text all \x03

# Tabs
map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
