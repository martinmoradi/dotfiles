# -----------------------------------------------------
# Martin's Kitty overrides
# This gets copied to ~/.config/kitty/custom.conf
# Loaded last by kitty.conf — later settings win.
# -----------------------------------------------------

shell /usr/bin/zsh

# ----- Font -----
# Same face as the ML4W default (JetBrainsMono), but the Nerd Font *Mono*
# build: identical text rendering, strict cell-width icons in the tab bar
# (the proportional build clips/overlaps glyphs there).
font_family             JetBrainsMono Nerd Font Mono
bold_font               auto
italic_font             auto
bold_italic_font        auto
font_size               13

# ----- Appearance -----
# background_opacity  0.8
# window_padding_width 12

# ----- Tab bar (browser-like) -----
tab_bar_edge            top
# Kitty draws the slanted tabs. tab_bar.py only formats stable information as
# "<index> <directory> · <task title>"; it does not inspect process trees.
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_min_tabs        2
tab_bar_margin_height   2.0 0.0
tab_title_template      "{custom}"
tab_title_max_length    42
active_tab_font_style   bold
inactive_tab_font_style normal
# Warm neutral, clean:
#   bar          = #1e1f25 (dark gray)
#   active tab   = #cabcb8 (warm light gray) + dark #1e1f25 text
#   inactive tab = #443425 (warm dark) + warm cream #e6d3c3 text
tab_bar_background      #1e1f25
active_tab_background   #cabcb8
active_tab_foreground   #1e1f25
inactive_tab_background #443425
inactive_tab_foreground #e6d3c3

# ----- Quality of life -----
# ML4W default is 2000 lines, too little for build/test logs.
scrollback_lines        10000
# Desktop notification when a command running >10s finishes in a window that
# doesn't have focus (relies on kitty's zsh shell integration).
notify_on_cmd_finish    unfocused 10.0

# ----- Behavior -----
# Copy/paste on ctrl+c/v, SIGINT on ctrl+shift+c.
# Ctrl+V is an image-aware "smart paste" (clip-smart-paste.sh): a clipboard
# image is typed in as a file path (Claude Code / Codex read images by path),
# while text uses kitty's native bracketed paste so multiline content arrives as
# one paste (no interior-newline Enters). One thumb key for both, like Cmd+V.
# --allow-remote-control lets the script trigger kitty's own paste for text.
map ctrl+c copy_or_interrupt
map ctrl+v launch --type=background --allow-remote-control ~/.local/bin/clip-smart-paste.sh
map ctrl+shift+c send_text all \x03

# Tabs (browser-like)
map ctrl+t new_tab_with_cwd
map ctrl+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
# Give the current tab a fixed task name when an application title is vague.
map ctrl+shift+t set_tab_title
# Jump straight to a tab with F1..F5 (full-screen TUIs like htop won't get these
# keys while focused — use alt+number instead there if ever needed)
map f1 goto_tab 1
map f2 goto_tab 2
map f3 goto_tab 3
map f4 goto_tab 4
map f5 goto_tab 5
# Reorder the current tab, like dragging a browser tab
map ctrl+shift+page_up   move_tab_backward
map ctrl+shift+page_down move_tab_forward
# New window (split) in the current directory (default keeps kitty's start dir)
map ctrl+shift+enter launch --cwd=current
