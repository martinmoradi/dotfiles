# -----------------------------------------------------
# Martin's Kitty overrides
# This gets copied to ~/.config/kitty/custom.conf
# Loaded last by kitty.conf — later settings win.
# -----------------------------------------------------

# ----- Font -----
font_size               13

# ----- Appearance -----
# background_opacity  0.8
# window_padding_width 12

# ----- Tab bar (browser-like) -----
tab_bar_edge            top
# Custom drawer (tab_bar.py): per-app icon + dir, flat/minimal shape. The label
# is built entirely in Python, so the template just passes {title} through.
tab_bar_style           custom
tab_bar_min_tabs        1
tab_bar_margin_height   2.0 0.0
tab_separator           " │ "
tab_title_template      "{title}"
tab_title_max_length    24
active_tab_font_style   bold
inactive_tab_font_style normal
# Warm neutral, clean:
#   bar          = #1e1f25 (dark gray)
#   active tab   = #cabcb8 (warm light gray) + dark #1e1f25 text
#   inactive tab = #443425 (warm dark) + warm cream #e6d3c3 text
tab_bar_background      #1e1f25
active_tab_background   #cabcb8
active_tab_foreground   #1e1f25
inactive_tab_background #443425
inactive_tab_foreground #e6d3c3

# ----- Behavior -----
# Copy/paste on ctrl+c/v, SIGINT on ctrl+shift+c.
# Ctrl+V uses kitty's native bracketed paste so multiline text arrives as one
# paste (Claude Code / shells won't treat interior newlines as Enter).
# Ctrl+Shift+S pastes a clipboard *image* as a typed file path (Claude Code /
# Codex read images by path). It's a kitty `launch` bind (not a global Super
# bind) so the typed path can't fire window-manager chords; the script sleeps
# briefly so the modifiers release before wtype types. Cliphist stays Super+V.
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+shift+s launch --type=background ~/.local/bin/clip-image-paste.sh
map ctrl+shift+c send_text all \x03

# Tabs (browser-like)
map ctrl+t new_tab_with_cwd
map ctrl+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
# Jump straight to a tab with F1..F5 (full-screen TUIs like htop won't get these
# keys while focused — use alt+number instead there if ever needed)
map f1 goto_tab 1
map f2 goto_tab 2
map f3 goto_tab 3
map f4 goto_tab 4
map f5 goto_tab 5
# Reorder the current tab, like dragging a browser tab
map ctrl+shift+page_up   move_tab_backward
map ctrl+shift+page_down move_tab_forward
