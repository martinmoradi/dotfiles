# -----------------------------------------------------
# Martin's Hyprland overrides
# This gets copied to ~/.config/hypr/conf/custom.conf
# Sourced LAST in hyprland.conf — anything here wins.
# -----------------------------------------------------

# ----- Monitors -----
# Uncomment and adjust for your setup. Run `hyprctl monitors all` to see names.
# monitor = DP-1, 2560x1440@165, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1

# ----- Plugin loading -----
exec-once = hyprpm reload -n
# Rebuild plugins automatically after a Hyprland upgrade (see hyprpm-autoupdate.sh)
exec-once = ~/.local/bin/hyprpm-autoupdate.sh
# Project Hub for the dev workflow.
exec-once = qs -d -p ~/.config/quickshell-projects
# Current-project infra notification watcher.
exec-once = ~/.local/bin/project-hub-watch

# ----- Split monitor workspaces -----
# Each monitor gets independent workspaces 1-5
plugin {
    split-monitor-workspaces {
        count = 5
        enable_persistent_workspaces = 1
        monitor_priority = DP-1, HDMI-A-1
    }
}

# DP-1 is the main monitor: gets workspace 1 and cursor on startup
workspace = 1, monitor:DP-1, default:true
workspace = 6, monitor:HDMI-A-1, default:true

# ----- Keybinding overrides -----

# Launcher: SUPER+SPACE (default was SUPER+CTRL+RETURN)
unbind = $mainMod CTRL, RETURN
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/launcher.sh

# Apps and current-project launchers.
unbind = $mainMod, RETURN
unbind = $mainMod, B
unbind = $mainMod SHIFT, B
unbind = $mainMod, C
unbind = $mainMod SHIFT, C
unbind = $mainMod, D
unbind = $mainMod, E
unbind = $mainMod, I
unbind = $mainMod SHIFT, I
unbind = $mainMod, M
unbind = $mainMod SHIFT, M
unbind = $mainMod, X
unbind = $mainMod, equal

bind = $mainMod, RETURN, exec, kitty
bind = $mainMod SHIFT, RETURN, exec, ~/.local/bin/dev-project terminal
bind = $mainMod, B, exec, ~/.config/ml4w/settings/browser.sh
bind = $mainMod SHIFT, B, exec, google-chrome-stable
bind = $mainMod, I, exec, code
bind = $mainMod SHIFT, I, exec, ~/.local/bin/dev-project code
bind = $mainMod, X, exec, codex-app-linux
bind = $mainMod, D, exec, vesktop
bind = $mainMod, M, exec, spotify
bind = $mainMod, E, exec, ~/.config/ml4w/settings/filemanager
bind = $mainMod, equal, exec, ~/.config/ml4w/settings/calculator.sh
bind = $mainMod SHIFT, M, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Project workflow.
unbind = $mainMod, P
unbind = $mainMod, grave
unbind = $mainMod SHIFT, grave
bind = $mainMod, P, exec, ~/.local/bin/dev-project hub
bind = $mainMod, grave, exec, ~/.local/bin/dev-project drawer
bind = $mainMod SHIFT, grave, exec, ~/.local/bin/dev-project drawer-reset

# Prune ML4W utility shortcuts that are better launcher-accessible.
unbind = $mainMod CTRL, E
unbind = $mainMod CTRL, C
unbind = $mainMod SHIFT, mouse_down
unbind = $mainMod SHIFT, mouse_up
unbind = $mainMod SHIFT, Z
unbind = $mainMod SHIFT, Q
unbind = $mainMod SHIFT, T
unbind = $mainMod ALT, T
unbind = $mainMod, J
unbind = $mainMod, K
unbind = $mainMod, G
unbind = $mainMod, left
unbind = $mainMod, right
unbind = $mainMod, up
unbind = $mainMod, down
unbind = $mainMod SHIFT, left
unbind = $mainMod SHIFT, right
unbind = $mainMod SHIFT, up
unbind = $mainMod SHIFT, down
unbind = $mainMod ALT, left
unbind = $mainMod ALT, right
unbind = $mainMod ALT, up
unbind = $mainMod ALT, down
unbind = $mainMod SHIFT, A
unbind = $mainMod ALT, A
unbind = $mainMod CTRL, P
unbind = $mainMod SHIFT, W
unbind = $mainMod CTRL, W
unbind = $mainMod ALT, W
unbind = $mainMod CTRL, K
unbind = $mainMod CTRL, B
unbind = $mainMod SHIFT, R
unbind = $mainMod CTRL, T
unbind = $mainMod ALT, G
unbind = $mainMod SHIFT, H
unbind = CTRL ALT, T

# Reload the dotfiles-owned shell layer: Hyprland config + Waybar.
bind = $mainMod SHIFT, R, exec, ~/.local/bin/reload-desktop.sh

# Bare hardware keys: keep volume up/down and brightness; remove surprise mutes/media/tools.
unbind = , XF86AudioMute
unbind = , XF86AudioPlay
unbind = , XF86AudioPause
unbind = , XF86AudioNext
unbind = , XF86AudioPrev
unbind = , XF86AudioMicMute
unbind = , XF86Tools

# Sidepad/sidebar: disable ML4W shortcuts; unused, and Super+S is screenshots.
unbind = $mainMod CTRL, right
unbind = $mainMod CTRL, left
unbind = $mainMod CTRL, S
unbind = $mainMod, right
unbind = $mainMod, left
unbind = $mainMod, S
unbind = $mainMod SHIFT, S

# Screenshots: Super+S = area select, PrintScreen = active window.
unbind = $mainMod ALT, F
unbind = $mainMod ALT, S
unbind = $mainMod, PRINT
unbind = SHIFT, PRINT
bind = $mainMod, S, exec, ~/.local/bin/screenshot-area-clipboard.sh
bind = , PRINT, exec, ~/.local/bin/screenshot-active-clipboard.sh

# Clipboard-image paste into a terminal is handled by kitty's smart Ctrl+V
# (see kitty/custom.conf -> clip-smart-paste.sh), NOT a Super/global bind:
# wtype types the screenshot's file path, and a held Super would turn that path
# into a burst of Super+key launcher/workspace chords. Super+V stays ML4W's
# cliphist manager (its default).

# --- Workspace keybinds (replace defaults with split-monitor versions) ---

# Unbind all default workspace binds
unbind = $mainMod, 1
unbind = $mainMod, 2
unbind = $mainMod, 3
unbind = $mainMod, 4
unbind = $mainMod, 5
unbind = $mainMod, 6
unbind = $mainMod, 7
unbind = $mainMod, 8
unbind = $mainMod, 9
unbind = $mainMod, 0
unbind = $mainMod SHIFT, 1
unbind = $mainMod SHIFT, 2
unbind = $mainMod SHIFT, 3
unbind = $mainMod SHIFT, 4
unbind = $mainMod SHIFT, 5
unbind = $mainMod SHIFT, 6
unbind = $mainMod SHIFT, 7
unbind = $mainMod SHIFT, 8
unbind = $mainMod SHIFT, 9
unbind = $mainMod SHIFT, 0
unbind = $mainMod, Tab
unbind = $mainMod SHIFT, Tab
unbind = $mainMod, mouse_down
unbind = $mainMod, mouse_up
unbind = $mainMod CTRL, down
unbind = $mainMod CTRL, 1
unbind = $mainMod CTRL, 2
unbind = $mainMod CTRL, 3
unbind = $mainMod CTRL, 4
unbind = $mainMod CTRL, 5
unbind = $mainMod CTRL, 6
unbind = $mainMod CTRL, 7
unbind = $mainMod CTRL, 8
unbind = $mainMod CTRL, 9
unbind = $mainMod CTRL, 0

# Switch to workspace (per-monitor)
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5

# Move window to workspace (per-monitor)
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5

# ----- Window rules -----
# windowrule = match:class ^(Code)$, opacity 0.9
windowrule = match:class ^(dotfiles-devpad)$, workspace special:devpad silent
windowrule = match:class ^(dotfiles-devpad)$, float true
windowrule = match:class ^(dotfiles-devpad)$, size 45% 85%
windowrule = match:class ^(dotfiles-devpad)$, move 2% 8%

# Dedicated browser window for animation capture. Two launchers share the
# class `claude-mcp` so they get identical placement:
#   - claude-mcp-chrome           (real Chrome + Claude-in-Chrome extension)
#   - agent-browser --headed --args "--class=claude-mcp"  (the headless-map /
#     headed-capture CLI driver; selector-driven, the preferred path)
# Floating + fixed size: keeps screenshot px ~= CSS px for the extension path,
# and a stable window for the CLI path. Height 1080 (taller than the old 900) to
# leave a good laptop-sized content viewport AFTER the browser/extension header
# eats the top ~120-150px. Parked on HDMI-A-1 (the vertical second monitor) via
# its absolute workspace ID 6 — NOT a split-workspace relative number, which is
# focus-dependent and would drag it onto the main monitor. Pinned so it stays
# foregrounded across that monitor's workspaces (rAF isn't throttled) while the
# main DP-1 monitor stays clear. Close it when done; relaunch any time.
windowrule = match:class ^(claude-mcp)$, float true
windowrule = match:class ^(claude-mcp)$, size 1280 1080
windowrule = match:class ^(claude-mcp)$, workspace 6 silent
windowrule = match:class ^(claude-mcp)$, center 1
windowrule = match:class ^(claude-mcp)$, pin true

# ----- Misc -----
