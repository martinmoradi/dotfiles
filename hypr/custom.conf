# -----------------------------------------------------
# Martin's Hyprland overrides
# This gets copied to ~/.config/hypr/conf/custom.conf
# Sourced LAST in hyprland.conf — anything here wins.
# -----------------------------------------------------

# ----- Monitors -----
# Uncomment and adjust for your setup. Run `hyprctl monitors all` to see names.
# monitor = DP-1, 2560x1440@165, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1

# ----- Plugin loading -----
exec-once = hyprpm reload -n
# Rebuild plugins automatically after a Hyprland upgrade (see hyprpm-autoupdate.sh)
exec-once = ~/.local/bin/hyprpm-autoupdate.sh

# ----- Split monitor workspaces -----
# Each monitor gets independent workspaces 1-5
plugin {
    split-monitor-workspaces {
        count = 5
        enable_persistent_workspaces = 1
        monitor_priority = DP-1, HDMI-A-1
    }
}

# DP-1 is the main monitor: gets workspace 1 and cursor on startup
workspace = 1, monitor:DP-1, default:true
workspace = 6, monitor:HDMI-A-1, default:true

# ----- Keybinding overrides -----

# Launcher: SUPER+SPACE (default was SUPER+CTRL+RETURN)
unbind = $mainMod CTRL, RETURN
bind = $mainMod, SPACE, exec, ~/.config/hypr/scripts/launcher.sh

# Apps
bind = $mainMod, C, exec, code
bind = $mainMod SHIFT, C, exec, ~/.config/ml4w/settings/calculator.sh
bind = $mainMod, D, exec, vesktop
unbind = $mainMod, M
bind = $mainMod, M, exec, spotify
bind = ALT, RETURN, fullscreen, 1

# Sidepad: SUPER+Right/Left (default was SUPER+CTRL+Right/Left)
unbind = $mainMod CTRL, right
unbind = $mainMod CTRL, left
unbind = $mainMod, right
unbind = $mainMod, left
bind = $mainMod, right, exec, ~/.config/ml4w/scripts/ml4w-sidepad
bind = $mainMod, left, exec, ~/.config/ml4w/scripts/ml4w-sidepad --hide

# Screenshots: PrintScreen = instant area select (like Win+Shift+S)
#              Shift+PrintScreen = screenshot menu
unbind = $mainMod, PRINT
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, PRINT, exec, ~/.config/hypr/scripts/screenshot.sh

# --- Workspace keybinds (replace defaults with split-monitor versions) ---

# Unbind all default workspace binds
unbind = $mainMod, 1
unbind = $mainMod, 2
unbind = $mainMod, 3
unbind = $mainMod, 4
unbind = $mainMod, 5
unbind = $mainMod, 6
unbind = $mainMod, 7
unbind = $mainMod, 8
unbind = $mainMod, 9
unbind = $mainMod, 0
unbind = $mainMod SHIFT, 1
unbind = $mainMod SHIFT, 2
unbind = $mainMod SHIFT, 3
unbind = $mainMod SHIFT, 4
unbind = $mainMod SHIFT, 5
unbind = $mainMod SHIFT, 6
unbind = $mainMod SHIFT, 7
unbind = $mainMod SHIFT, 8
unbind = $mainMod SHIFT, 9
unbind = $mainMod SHIFT, 0
unbind = $mainMod, Tab
unbind = $mainMod SHIFT, Tab
unbind = $mainMod, mouse_down
unbind = $mainMod, mouse_up
unbind = $mainMod CTRL, down
unbind = $mainMod CTRL, 1
unbind = $mainMod CTRL, 2
unbind = $mainMod CTRL, 3
unbind = $mainMod CTRL, 4
unbind = $mainMod CTRL, 5
unbind = $mainMod CTRL, 6
unbind = $mainMod CTRL, 7
unbind = $mainMod CTRL, 8
unbind = $mainMod CTRL, 9
unbind = $mainMod CTRL, 0

# Switch to workspace (per-monitor)
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5

# Move window to workspace (per-monitor)
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5

# Cycle workspaces (per-monitor)
bind = $mainMod, Tab, split-cycleworkspaces, +1
bind = $mainMod SHIFT, Tab, split-cycleworkspaces, -1
bind = $mainMod, mouse_down, split-cycleworkspaces, +1
bind = $mainMod, mouse_up, split-cycleworkspaces, -1

# ----- Window rules -----
# windowrulev2 = opacity 0.9, class:^(Code)$

# ----- Misc -----
